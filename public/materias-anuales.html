<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Materias Anuales - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Materias Anuales</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /materias-anuales</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Query (ej: ?anio=2026)</label><input id="queryValue" placeholder="?anio=2026" /></div>
          <div><label>Filtro anio (GET)</label><input id="anioValue" placeholder="2025" /></div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "materiaId": 1,
  "anioId": 1,
  "nombre": "Matematica 2026",
  "cargaHoraria": 4
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /materias-anuales</button>
          <button id="btnGetById">GET /materias-anuales/:id</button>
          <button class="primary" id="btnCreate">POST /materias-anuales</button>
          <button id="btnUpdate">PUT /materias-anuales/:id</button>
          <button id="btnDelete">DELETE /materias-anuales/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('materias-anuales.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getQueryValue() { return document.getElementById('queryValue').value.trim(); }
      function getAnioValue() { return document.getElementById('anioValue').value.trim(); }
      function normalizeManualQuery(raw) {
        if (!raw) return '';
        if (raw.startsWith('?')) return raw;
        if (/^\d+$/.test(raw)) return `?anio=${encodeURIComponent(raw)}`;
        if (raw.includes('=')) return `?${raw}`;
        return '';
      }
      function getAutoQueryValue() {
        const anio = getAnioValue();
        if (!anio) return '';
        const params = new URLSearchParams();
        params.set('anio', anio);
        return `?${params.toString()}`;
      }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => {
        const queryManual = getQueryValue();
        const query = normalizeManualQuery(queryManual) || getAutoQueryValue();
        run('GET', `/materias-anuales${query}`);
      });
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/materias-anuales/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/materias-anuales', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/materias-anuales/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/materias-anuales/${getIdValue()}`));
    </script>
  </body>
</html>
