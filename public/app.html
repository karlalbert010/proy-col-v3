<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio App - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Cole DB - Inicio</h1>
    </header>
    <main>
      <section class="panel">
        <h2>Accesos operativos</h2>
        <p class="status" id="status"></p>
        <div class="actions">
          <button class="primary" data-href="/calificaciones-trimestral.html">Calificaciones trimestrales</button>
          <button data-href="/calificaciones-detalle.html">Calificacion detalle</button>
          <button data-href="/anios.html">Anios lectivos</button>
          <button data-href="/cursos.html">Cursos</button>
          <button data-href="/matriculas.html">Matriculas</button>
        </div>
      </section>

      <section class="panel">
        <h2>Sesion</h2>
        <div class="actions">
          <button id="logoutBtn">Cerrar sesion</button>
        </div>
      </section>
    </main>

    <script src="/api.js"></script>
    <script>
      const token = coleApi.getToken();
      const statusEl = document.getElementById('status');

      if (!token) {
        window.location.href = '/auth.html';
      } else {
        statusEl.className = 'status ok';
        statusEl.textContent = 'Sesion activa.';
      }

      document.querySelectorAll('button[data-href]').forEach((button) => {
        button.addEventListener('click', () => {
          window.location.href = button.getAttribute('data-href');
        });
      });

      document.getElementById('logoutBtn').addEventListener('click', () => {
        coleApi.clearToken();
        window.location.href = '/auth.html';
      });
    </script>
  </body>
</html>
