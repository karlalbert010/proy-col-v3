<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CursoMateriaDocente - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>CursoMateriaDocente</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>Ver y Filtrar /curso-materia-docente</h2>
        <div class="grid two">
          <div><label>Anio</label><input id="anioValue" placeholder="2025" /></div>
          <div><label>Curso ID</label><input id="cursoIdValue" placeholder="6" /></div>
          <div><label>MateriaAnual ID</label><input id="materiaAnualIdValue" placeholder="3" /></div>
          <div><label>Docente ID</label><input id="docenteIdValue" placeholder="6" /></div>
          <div>
            <label>Activo</label>
            <select id="activoValue">
              <option value="">(todos)</option>
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button class="primary" id="btnGetAll">GET /curso-materia-docente</button>
          <button id="btnReset">Limpiar filtros</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('curso-materia-docente.html');
      function byId(id) { return document.getElementById(id); }
      function buildQuery() {
        const params = new URLSearchParams();
        const anio = byId('anioValue').value.trim();
        const cursoId = byId('cursoIdValue').value.trim();
        const materiaAnualId = byId('materiaAnualIdValue').value.trim();
        const docenteId = byId('docenteIdValue').value.trim();
        const activo = byId('activoValue').value.trim();
        if (anio) params.set('anio', anio);
        if (cursoId) params.set('cursoId', cursoId);
        if (materiaAnualId) params.set('materiaAnualId', materiaAnualId);
        if (docenteId) params.set('docenteId', docenteId);
        if (activo) params.set('activo', activo);
        const query = params.toString();
        return query ? `?${query}` : '';
      }

      async function runGet() {
        const path = `/curso-materia-docente${buildQuery()}`;
        const { response, payload } = await coleApi.apiRequest('GET', path);
        coleApi.showStatus('status', `GET ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', payload);
      }

      function resetFilters() {
        byId('anioValue').value = '';
        byId('cursoIdValue').value = '';
        byId('materiaAnualIdValue').value = '';
        byId('docenteIdValue').value = '';
        byId('activoValue').value = '';
      }

      byId('btnGetAll').addEventListener('click', runGet);
      byId('btnReset').addEventListener('click', resetFilters);
    </script>
  </body>
</html>
