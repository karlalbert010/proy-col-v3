<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Cambios - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Log Cambios (solo ADMIN)</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /log-cambios</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div>
            <label>Query (ej: ?tablaAfectada=AnioLectivo&tipoOperacion=UPDATE)</label>
            <input id="queryValue" placeholder="?tablaAfectada=AnioLectivo" />
          </div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "usuario": "user:1",
  "tablaAfectada": "PruebaManual",
  "idRegistro": 99,
  "tipoOperacion": "INSERT",
  "valorAnterior": null,
  "valorNuevo": {"ok": true}
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /log-cambios</button>
          <button id="btnGetById">GET /log-cambios/:id</button>
          <button class="primary" id="btnCreate">POST /log-cambios</button>
          <button id="btnUpdate">PUT /log-cambios/:id</button>
          <button id="btnDelete">DELETE /log-cambios/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('log-cambios.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getQueryValue() { return document.getElementById('queryValue').value.trim(); }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => run('GET', `/log-cambios${getQueryValue()}`));
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/log-cambios/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/log-cambios', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/log-cambios/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/log-cambios/${getIdValue()}`));
    </script>
  </body>
</html>
