<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reglas de Calculo - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Reglas de Calculo</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /reglas-calculo</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Query manual (opcional)</label><input id="queryValue" placeholder="?anioLectivoId=2&activa=true" /></div>
          <div><label>Filtro anioLectivoId</label><input id="anioLectivoIdFilter" placeholder="2" /></div>
          <div><label>Filtro cursoMateriaDocenteId</label><input id="cmdFilter" placeholder="13" /></div>
          <div>
            <label>Filtro duracion</label>
            <select id="duracionFilter">
              <option value="">(todas)</option>
              <option value="MENSUAL">MENSUAL</option>
              <option value="BIMESTRAL">BIMESTRAL</option>
              <option value="TRIMESTRAL">TRIMESTRAL</option>
              <option value="CUATRIMESTRAL">CUATRIMESTRAL</option>
              <option value="ANUAL">ANUAL</option>
              <option value="OTRO">OTRO</option>
            </select>
          </div>
          <div>
            <label>Filtro activa</label>
            <select id="activaFilter">
              <option value="">(todas)</option>
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "anioLectivoId": 2,
  "cursoMateriaDocenteId": null,
  "duracion": "TRIMESTRAL",
  "estrategia": "MAX_CON_RECUP",
  "ponderacionRegular": 1,
  "ponderacionRecuperatorio": 1,
  "minAprobacion": 6,
  "decimales": 2,
  "activa": true,
  "observaciones": "Regla global anual."
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /reglas-calculo</button>
          <button id="btnGetById">GET /reglas-calculo/:id</button>
          <button class="primary" id="btnCreate">POST /reglas-calculo</button>
          <button id="btnUpdate">PUT /reglas-calculo/:id</button>
          <button id="btnDelete">DELETE /reglas-calculo/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="panel">
        <h2>Respuesta</h2>
        <pre id="result">{}</pre>
      </section>
    </main>

    <script src="/api.js"></script>
    <script src="/nav.js"></script>
    <script>
      renderTopNav('reglas-calculo.html');

      function getIdValue() {
        return document.getElementById('idValue').value.trim();
      }
      function getQueryValue() {
        return document.getElementById('queryValue').value.trim();
      }
      function getBodyValue() {
        return coleApi.parseBody(document.getElementById('bodyValue').value);
      }
      function getAutoQuery() {
        const params = new URLSearchParams();
        const anioLectivoId = document.getElementById('anioLectivoIdFilter').value.trim();
        const cmd = document.getElementById('cmdFilter').value.trim();
        const duracion = document.getElementById('duracionFilter').value.trim();
        const activa = document.getElementById('activaFilter').value.trim();

        if (anioLectivoId) params.set('anioLectivoId', anioLectivoId);
        if (cmd) params.set('cursoMateriaDocenteId', cmd);
        if (duracion) params.set('duracion', duracion);
        if (activa) params.set('activa', activa);

        const query = params.toString();
        return query ? `?${query}` : '';
      }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => {
        const query = getQueryValue() || getAutoQuery();
        run('GET', `/reglas-calculo${query}`);
      });
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/reglas-calculo/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/reglas-calculo', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/reglas-calculo/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/reglas-calculo/${getIdValue()}`));
    </script>
  </body>
</html>
