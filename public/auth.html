<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Cole DB - Login</h1>
    </header>
    <main>
      <section class="panel">
        <h2>Ingreso al sistema</h2>
        <div class="grid two">
          <div>
            <label>Username</label>
            <input id="username" value="admin" />
          </div>
          <div>
            <label>Password</label>
            <input id="password" type="password" value="admin123" />
          </div>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button class="primary" id="loginBtn">Iniciar sesion</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="panel">
        <h2>Respuesta</h2>
        <pre id="result">{}</pre>
      </section>
    </main>
    <script src="/api.js"></script>
    <script>
      function extractToken(payload) {
        const value = payload && payload.data ? payload.data.token : '';
        if (!value) return '';
        if (typeof value === 'string') return value;
        if (typeof value === 'object' && value.token) return value.token;
        return '';
      }

      if (coleApi.getToken()) {
        window.location.href = '/app.html';
      }

      document.getElementById('loginBtn').addEventListener('click', async () => {
        try {
          const username = document.getElementById('username').value.trim();
          const password = document.getElementById('password').value;
          const { response, payload } = await coleApi.apiRequest('POST', '/auth/login', { username, password });

          if (!response.ok) {
            coleApi.showStatus('status', payload.message || 'Error de login', false);
            coleApi.showResult('result', payload);
            return;
          }

          const token = extractToken(payload);
          if (token) {
            coleApi.setToken(token);
          }
          coleApi.showStatus('status', 'Login OK. Redirigiendo al inicio...', true);
          coleApi.showResult('result', payload);
          setTimeout(() => {
            window.location.href = '/app.html';
          }, 1000);
        } catch (error) {
          coleApi.showStatus('status', `Error: ${error.message}`, false);
        }
      });
    </script>
  </body>
</html>
