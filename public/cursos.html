<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursos - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Cursos</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /cursos</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Query manual (opcional)</label><input id="queryValue" placeholder="?anio=2026&estado=BORRADOR" /></div>
          <div><label>Filtro anio</label><input id="anioFilter" placeholder="2026" /></div>
          <div>
            <label>Filtro estado</label>
            <select id="estadoFilter">
              <option value="">(todos)</option>
              <option value="BORRADOR">BORRADOR</option>
              <option value="ACTIVO">ACTIVO</option>
              <option value="CERRADO">CERRADO</option>
            </select>
          </div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "nombre": "1A",
  "anioId": 1
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /cursos</button>
          <button id="btnGetById">GET /cursos/:id</button>
          <button class="primary" id="btnCreate">POST /cursos</button>
          <button id="btnUpdate">PUT /cursos/:id</button>
          <button id="btnDelete">DELETE /cursos/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('cursos.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getQueryValue() { return document.getElementById('queryValue').value.trim(); }
      function getAutoQuery() {
        const anio = document.getElementById('anioFilter').value.trim();
        const estado = document.getElementById('estadoFilter').value.trim();
        const params = new URLSearchParams();
        if (anio) params.set('anio', anio);
        if (estado) params.set('estado', estado);
        const query = params.toString();
        return query ? `?${query}` : '';
      }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => {
        const manual = getQueryValue();
        const query = manual || getAutoQuery();
        run('GET', `/cursos${query}`);
      });
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/cursos/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/cursos', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/cursos/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/cursos/${getIdValue()}`));
    </script>
  </body>
</html>
