<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evaluaciones - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Evaluaciones</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /evaluaciones</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Query manual (opcional)</label><input id="queryValue" placeholder="?anio=2025&estado=ABIERTA" /></div>
          <div><label>Filtro anio</label><input id="anioFilter" placeholder="2025" /></div>
          <div><label>Filtro cursoMateriaId</label><input id="cursoMateriaFilter" placeholder="7" /></div>
          <div><label>Filtro periodoId</label><input id="periodoFilter" placeholder="4" /></div>
          <div>
            <label>Filtro tipo</label>
            <select id="tipoFilter">
              <option value="">(todos)</option>
              <option value="PARCIAL">PARCIAL</option>
              <option value="TRABAJO_PRACTICO">TRABAJO_PRACTICO</option>
              <option value="ORAL">ORAL</option>
              <option value="TAREA">TAREA</option>
              <option value="ORIENTADORA">ORIENTADORA</option>
              <option value="MES_1">MES_1</option>
              <option value="MES_2">MES_2</option>
              <option value="MES_3">MES_3</option>
              <option value="RECUPERATORIO">RECUPERATORIO</option>
              <option value="OTRO">OTRO</option>
            </select>
          </div>
          <div>
            <label>Filtro estado</label>
            <select id="estadoFilter">
              <option value="">(todos)</option>
              <option value="ABIERTA">ABIERTA</option>
              <option value="CERRADA">CERRADA</option>
            </select>
          </div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "cursoMateriaId": 13,
  "periodoId": 4,
  "configEvaluacionId": null,
  "evaluacionPadreId": null,
  "tipo": "PARCIAL",
  "fecha": "2025-03-10T00:00:00.000Z",
  "titulo": "Parcial 1 - Unidad inicial",
  "descripcion": "Evaluacion de apertura de trimestre.",
  "ponderacion": 1,
  "estado": "ABIERTA"
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /evaluaciones</button>
          <button id="btnGetById">GET /evaluaciones/:id</button>
          <button class="primary" id="btnCreate">POST /evaluaciones</button>
          <button id="btnUpdate">PUT /evaluaciones/:id</button>
          <button id="btnDelete">DELETE /evaluaciones/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel">
        <h2>Respuesta</h2>
        <pre id="result">{}</pre>
      </section>
    </main>
    <script src="/api.js"></script>
    <script src="/nav.js"></script>
    <script>
      renderTopNav('evaluaciones.html');

      function getIdValue() {
        return document.getElementById('idValue').value.trim();
      }
      function getQueryValue() {
        return document.getElementById('queryValue').value.trim();
      }
      function getBodyValue() {
        return coleApi.parseBody(document.getElementById('bodyValue').value);
      }
      function getAutoQuery() {
        const params = new URLSearchParams();
        const anio = document.getElementById('anioFilter').value.trim();
        const cmd = document.getElementById('cursoMateriaFilter').value.trim();
        const periodoId = document.getElementById('periodoFilter').value.trim();
        const tipo = document.getElementById('tipoFilter').value.trim();
        const estado = document.getElementById('estadoFilter').value.trim();
        if (anio) params.set('anio', anio);
        if (cmd) params.set('cursoMateriaId', cmd);
        if (periodoId) params.set('periodoId', periodoId);
        if (tipo) params.set('tipo', tipo);
        if (estado) params.set('estado', estado);
        const query = params.toString();
        return query ? `?${query}` : '';
      }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => {
        const query = getQueryValue() || getAutoQuery();
        run('GET', `/evaluaciones${query}`);
      });
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/evaluaciones/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/evaluaciones', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/evaluaciones/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/evaluaciones/${getIdValue()}`));
    </script>
  </body>
</html>
