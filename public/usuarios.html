<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuarios - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Usuarios (solo ADMIN)</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /usuarios</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "username": "docente_demo",
  "password": "docente123",
  "rol": "DOCENTE",
  "activo": true
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /usuarios</button>
          <button id="btnGetById">GET /usuarios/:id</button>
          <button class="primary" id="btnCreate">POST /usuarios</button>
          <button id="btnUpdate">PUT /usuarios/:id</button>
          <button id="btnDelete">DELETE /usuarios/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('usuarios.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => run('GET', '/usuarios'));
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/usuarios/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/usuarios', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/usuarios/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/usuarios/${getIdValue()}`));
    </script>
  </body>
</html>
