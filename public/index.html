<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cole API Tester</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Cole API Tester (HTML + JS puro)</h1>
      <div id="topNav" class="top"></div>
    </header>

    <main>
      <section class="panel">
        <h2>Configuracion</h2>
        <div class="grid two">
          <div>
            <label>API Base URL (vacío = mismo host)</label>
            <input id="apiBase" placeholder="http://localhost:3001" />
          </div>
          <div>
            <label>Token JWT guardado</label>
            <input id="token" placeholder="Se completa desde /auth.html" />
          </div>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button class="primary" id="saveConfig">Guardar</button>
          <button id="clearToken">Borrar token</button>
        </div>
        <p class="status" id="status"></p>
      </section>

      <section class="panel">
        <h2>Uso rapido</h2>
        <ol>
          <li>Ir a <a href="/auth.html">/auth.html</a> y hacer login.</li>
          <li>El token queda guardado en `localStorage`.</li>
          <li>Ir a cada pagina de modulo y probar endpoints.</li>
          <li>Ver respuesta JSON en cada pagina.</li>
        </ol>
      </section>
    </main>

    <script src="/api.js"></script>
    <script src="/nav.js"></script>
    <script>
      renderTopNav('index.html');
      const apiBaseEl = document.getElementById('apiBase');
      const tokenEl = document.getElementById('token');
      const statusEl = document.getElementById('status');

      apiBaseEl.value = coleApi.getApiBase();
      tokenEl.value = coleApi.getToken();

      document.getElementById('saveConfig').addEventListener('click', () => {
        coleApi.setApiBase(apiBaseEl.value);
        coleApi.setToken(tokenEl.value.trim());
        statusEl.className = 'status ok';
        statusEl.textContent = 'Configuracion guardada.';
      });

      document.getElementById('clearToken').addEventListener('click', () => {
        coleApi.clearToken();
        tokenEl.value = '';
        statusEl.className = 'status ok';
        statusEl.textContent = 'Token eliminado.';
      });
    </script>
  </body>
</html>
