<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alumnos - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Alumnos</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /alumnos</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Filtro cursoId (GET)</label><input id="cursoIdValue" placeholder="6" /></div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "apellido": "Perez",
  "nombre": "Ana",
  "dni": "33111222",
  "activo": true
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /alumnos</button>
          <button id="btnGetById">GET /alumnos/:id</button>
          <button class="primary" id="btnCreate">POST /alumnos</button>
          <button id="btnUpdate">PUT /alumnos/:id</button>
          <button id="btnDelete">DELETE /alumnos/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('alumnos.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getCursoIdValue() { return document.getElementById('cursoIdValue').value.trim(); }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => {
        const cursoId = getCursoIdValue();
        const query = cursoId ? `?cursoId=${encodeURIComponent(cursoId)}` : '';
        run('GET', `/alumnos${query}`);
      });
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/alumnos/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/alumnos', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/alumnos/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/alumnos/${getIdValue()}`));
    </script>
  </body>
</html>
