<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Tablas - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Demo v2 - Visualizador de Tablas</h1>
      <div id="topNav" class="top"></div>
    </header>

    <main>
      <section class="panel">
        <h2>Consulta</h2>
        <div class="grid two">
          <div>
            <label>Anio lectivo demo</label>
            <input id="anioInput" value="2091" />
          </div>
          <div>
            <label>Tabla</label>
            <select id="tablaSelect"></select>
          </div>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button id="btnCargar" class="primary">Cargar tablas</button>
          <button id="btnVerTabla">Ver tabla seleccionada</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="panel">
        <h2>Conteos</h2>
        <pre id="conteos">{}</pre>
      </section>

      <section class="panel">
        <h2>Tabla seleccionada</h2>
        <pre id="resultado">[]</pre>
      </section>
    </main>

    <script src="/api.js"></script>
    <script src="/nav.js"></script>
    <script>
      renderTopNav('demo-tablas.html');

      const state = { payload: null };

      function byId(id) {
        return document.getElementById(id);
      }

      function setTableOptions() {
        const tablaSelect = byId('tablaSelect');
        const tables = Object.keys((state.payload && state.payload.tablas) || {});
        tablaSelect.innerHTML = tables.map((t) => `<option value="${t}">${t}</option>`).join('');
      }

      async function cargarTablas() {
        const anio = String(byId('anioInput').value || '').trim();
        const { response, payload } = await coleApi.apiRequest('GET', `/demo/tablas?anio=${encodeURIComponent(anio)}`);
        if (!response.ok) {
          coleApi.showStatus('status', `Error ${response.status} al cargar tablas.`, false);
          coleApi.showResult('resultado', payload);
          return;
        }

        state.payload = payload.data;
        setTableOptions();
        coleApi.showResult('conteos', state.payload.conteos || {});
        coleApi.showStatus('status', `Tablas demo cargadas para anio ${state.payload.anioLectivo.anio}.`, true);
        mostrarTabla();
      }

      function mostrarTabla() {
        if (!state.payload) {
          coleApi.showStatus('status', 'Primero carga las tablas.', false);
          return;
        }
        const tabla = byId('tablaSelect').value;
        const rows = state.payload.tablas[tabla] || [];
        coleApi.showResult('resultado', rows);
      }

      byId('btnCargar').addEventListener('click', cargarTablas);
      byId('btnVerTabla').addEventListener('click', mostrarTabla);
    </script>
  </body>
</html>
