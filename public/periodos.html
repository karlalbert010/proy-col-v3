<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Periodos - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Periodos</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>CRUD /periodos</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Query (ej: ?anio=2026)</label><input id="queryValue" placeholder="?anio=2026" /></div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "nombre": "Primer trimestre",
  "orden": 1,
  "anioId": 1
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /periodos</button>
          <button id="btnGetById">GET /periodos/:id</button>
          <button class="primary" id="btnCreate">POST /periodos</button>
          <button id="btnUpdate">PUT /periodos/:id</button>
          <button id="btnDelete">DELETE /periodos/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel"><h2>Respuesta</h2><pre id="result">{}</pre></section>
    </main>
    <script src="/api.js"></script><script src="/nav.js"></script>
    <script>
      renderTopNav('periodos.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getQueryValue() { return document.getElementById('queryValue').value.trim(); }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }
      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
      }

      document.getElementById('btnGetAll').addEventListener('click', () => run('GET', `/periodos${getQueryValue()}`));
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/periodos/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/periodos', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/periodos/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/periodos/${getIdValue()}`));
    </script>
  </body>
</html>
