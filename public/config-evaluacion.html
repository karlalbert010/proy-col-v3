<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Config Evaluacion - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 6px;
        text-align: left;
        font-size: 13px;
      }
      th {
        background: #f7f7f7;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Config Evaluacion (Planificacion por periodo)</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>Grilla minima</h2>
        <div class="grid two">
          <div><label>Filtro anio</label><input id="anioFilter" placeholder="2025" /></div>
          <div><label>Filtro cursoMateriaId</label><input id="cursoMateriaFilter" placeholder="7" /></div>
          <div><label>Filtro periodoId</label><input id="periodoFilter" placeholder="4" /></div>
          <div>
            <label>Filtro tipo</label>
            <select id="tipoFilter">
              <option value="">(todos)</option>
              <option value="PARCIAL">PARCIAL</option>
              <option value="TRABAJO_PRACTICO">TRABAJO_PRACTICO</option>
              <option value="ORAL">ORAL</option>
              <option value="TAREA">TAREA</option>
              <option value="MES_1">MES_1</option>
              <option value="MES_2">MES_2</option>
              <option value="MES_3">MES_3</option>
              <option value="RECUPERATORIO">RECUPERATORIO</option>
              <option value="OTRO">OTRO</option>
            </select>
          </div>
        </div>
        <div class="actions" style="margin-top: 10px">
          <button id="btnRefresh">Actualizar grilla</button>
        </div>
        <p id="statusGrid" class="status"></p>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Anio</th>
                <th>Curso</th>
                <th>Materia</th>
                <th>Periodo</th>
                <th>Mes</th>
                <th>Tipo</th>
                <th>Cant.</th>
                <th>Ponderacion</th>
                <th>Recup.</th>
              </tr>
            </thead>
            <tbody id="gridBody">
              <tr><td colspan="10">Sin datos.</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>CRUD /config-evaluacion</h2>
        <div class="grid two">
          <div><label>ID</label><input id="idValue" value="1" /></div>
          <div><label>Query manual (opcional)</label><input id="queryValue" placeholder="?anio=2025&periodoId=4" /></div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "cursoMateriaId": 7,
  "periodoId": 4,
  "mes": 3,
  "tipo": "PARCIAL",
  "cantidadEvaluaciones": 1,
  "ponderacion": 1,
  "recuperatorioHabilitado": true
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /config-evaluacion</button>
          <button id="btnGetById">GET /config-evaluacion/:id</button>
          <button class="primary" id="btnCreate">POST /config-evaluacion</button>
          <button id="btnUpdate">PUT /config-evaluacion/:id</button>
          <button id="btnDelete">DELETE /config-evaluacion/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>

      <section class="panel">
        <h2>Respuesta JSON</h2>
        <pre id="result">{}</pre>
      </section>
    </main>

    <script src="/api.js"></script>
    <script src="/nav.js"></script>
    <script>
      renderTopNav('config-evaluacion.html');

      function getIdValue() {
        return document.getElementById('idValue').value.trim();
      }
      function getQueryValue() {
        return document.getElementById('queryValue').value.trim();
      }
      function normalizeManualQuery(raw) {
        const value = String(raw || '').trim();
        if (!value) {
          return '';
        }
        if (value.startsWith('?')) {
          return value;
        }
        if (/^\d+$/.test(value)) {
          return `?anio=${value}`;
        }
        if (value.includes('=')) {
          return `?${value}`;
        }
        return `?${value}`;
      }
      function getBodyValue() {
        return coleApi.parseBody(document.getElementById('bodyValue').value);
      }
      function getAutoQuery() {
        const params = new URLSearchParams();
        const anio = document.getElementById('anioFilter').value.trim();
        const cursoMateriaId = document.getElementById('cursoMateriaFilter').value.trim();
        const periodoId = document.getElementById('periodoFilter').value.trim();
        const tipo = document.getElementById('tipoFilter').value.trim();
        if (anio) params.set('anio', anio);
        if (cursoMateriaId) params.set('cursoMateriaId', cursoMateriaId);
        if (periodoId) params.set('periodoId', periodoId);
        if (tipo) params.set('tipo', tipo);
        const query = params.toString();
        return query ? `?${query}` : '';
      }

      function renderGrid(items) {
        const body = document.getElementById('gridBody');
        if (!Array.isArray(items) || items.length === 0) {
          body.innerHTML = '<tr><td colspan="10">Sin datos.</td></tr>';
          return;
        }
        body.innerHTML = items
          .map((row) => {
            const anio = row?.periodo?.anio?.anio ?? '';
            const curso = row?.cursoMateria?.curso?.nombre ?? '';
            const materia = row?.cursoMateria?.materiaAnual?.nombre ?? '';
            const periodo = row?.periodo?.nombre ?? '';
            return `<tr>
              <td>${row.id}</td>
              <td>${anio}</td>
              <td>${curso}</td>
              <td>${materia}</td>
              <td>${periodo}</td>
              <td>${row.mes ?? ''}</td>
              <td>${row.tipo ?? ''}</td>
              <td>${row.cantidadEvaluaciones ?? ''}</td>
              <td>${row.ponderacion ?? ''}</td>
              <td>${row.recuperatorioHabilitado ? 'SI' : 'NO'}</td>
            </tr>`;
          })
          .join('');
      }

      async function run(method, path, payload) {
        const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
        coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
        coleApi.showResult('result', data);
        return { response, data };
      }

      async function refreshGrid() {
        const query = getAutoQuery();
        const { response, payload } = await coleApi.apiRequest('GET', `/config-evaluacion${query}`);
        coleApi.showStatus(
          'statusGrid',
          `GET /config-evaluacion${query} -> ${response.status}`,
          response.ok
        );
        if (response.ok && payload && payload.success) {
          renderGrid(payload.data);
        } else {
          renderGrid([]);
        }
      }

      document.getElementById('btnRefresh').addEventListener('click', refreshGrid);
      document.getElementById('btnGetAll').addEventListener('click', async () => {
        const query = normalizeManualQuery(getQueryValue()) || getAutoQuery();
        await run('GET', `/config-evaluacion${query}`);
      });
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/config-evaluacion/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', async () => {
        await run('POST', '/config-evaluacion', getBodyValue());
        await refreshGrid();
      });
      document.getElementById('btnUpdate').addEventListener('click', async () => {
        await run('PUT', `/config-evaluacion/${getIdValue()}`, getBodyValue());
        await refreshGrid();
      });
      document.getElementById('btnDelete').addEventListener('click', async () => {
        await run('DELETE', `/config-evaluacion/${getIdValue()}`);
        await refreshGrid();
      });

      refreshGrid();
    </script>
  </body>
</html>
