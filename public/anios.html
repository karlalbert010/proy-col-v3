<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anios - Cole API</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Anios Lectivos</h1>
      <div id="topNav" class="top"></div>
    </header>
    <main>
      <section class="panel">
        <h2>Entradas</h2>
        <div class="grid two">
          <div>
            <label>ID</label>
            <input id="idValue" value="1" />
          </div>
          <div>
            <label>Query (ej: ?anio=2026 o ?estado=ACTIVO)</label>
            <input id="queryValue" placeholder="?anio=2026" />
          </div>
        </div>
        <label style="margin-top: 10px">Body JSON</label>
        <textarea id="bodyValue">{
  "anio": 2026,
  "estado": "BORRADOR"
}</textarea>
        <div class="actions" style="margin-top: 10px">
          <button id="btnGetAll">GET /anios</button>
          <button id="btnGetActual">GET /anios/actual</button>
          <button id="btnGetById">GET /anios/:id</button>
          <button class="primary" id="btnCreate">POST /anios</button>
          <button id="btnUpdate">PUT /anios/:id</button>
          <button id="btnPatchEstado">PATCH /anios/:id/estado</button>
          <button id="btnDelete">DELETE /anios/:id</button>
        </div>
        <p id="status" class="status"></p>
      </section>
      <section class="panel">
        <h2>Respuesta</h2>
        <pre id="result">{}</pre>
      </section>
    </main>
    <script src="/api.js"></script>
    <script src="/nav.js"></script>
    <script>
      renderTopNav('anios.html');
      function getIdValue() { return document.getElementById('idValue').value.trim(); }
      function getQueryValue() { return document.getElementById('queryValue').value.trim(); }
      function getBodyValue() { return coleApi.parseBody(document.getElementById('bodyValue').value); }

      async function run(method, path, payload) {
        try {
          const { response, payload: data } = await coleApi.apiRequest(method, path, payload);
          coleApi.showStatus('status', `${method} ${path} -> ${response.status}`, response.ok);
          coleApi.showResult('result', data);
        } catch (error) {
          coleApi.showStatus('status', `Error: ${error.message}`, false);
        }
      }

      document.getElementById('btnGetAll').addEventListener('click', () => run('GET', `/anios${getQueryValue()}`));
      document.getElementById('btnGetActual').addEventListener('click', () => run('GET', '/anios/actual'));
      document.getElementById('btnGetById').addEventListener('click', () => run('GET', `/anios/${getIdValue()}`));
      document.getElementById('btnCreate').addEventListener('click', () => run('POST', '/anios', getBodyValue()));
      document.getElementById('btnUpdate').addEventListener('click', () => run('PUT', `/anios/${getIdValue()}`, getBodyValue()));
      document.getElementById('btnPatchEstado').addEventListener('click', () => run('PATCH', `/anios/${getIdValue()}/estado`, getBodyValue()));
      document.getElementById('btnDelete').addEventListener('click', () => run('DELETE', `/anios/${getIdValue()}`));
    </script>
  </body>
</html>
